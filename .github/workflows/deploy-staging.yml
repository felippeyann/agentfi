name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/api:staging

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ghcr.io/${{ github.repository }}/mcp:staging

      - name: Build and push Admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: ghcr.io/${{ github.repository }}/admin:staging

      - name: Run DB migrations
        run: |
          echo "Run: prisma migrate deploy on staging DB"

      - name: Smoke tests
        run: |
          curl -f ${{ vars.STAGING_API_URL }}/health || exit 1
          curl -f ${{ vars.STAGING_API_URL }}/health/ready || exit 1
