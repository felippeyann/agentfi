name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/backend/src/db/schema.prisma
      - run: npm run typecheck --workspaces --if-present
      - run: npm run lint --workspaces --if-present

  admin-test:
    name: Admin Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - working-directory: packages/admin
        run: npm test

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentfi
          POSTGRES_PASSWORD: agentfi
          POSTGRES_DB: agentfi_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/backend/src/db/schema.prisma
      - name: Apply database migrations
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://agentfi:agentfi@localhost:5432/agentfi_test
        run: npx prisma migrate deploy
      - working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://agentfi:agentfi@localhost:5432/agentfi_test
          REDIS_URL: redis://localhost:6379
          API_SECRET: test-secret-min-32-chars-long-here
          ADMIN_SECRET: test-admin-secret-min-32-chars-long
          OPERATOR_FEE_WALLET: '0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266'
          ALCHEMY_API_KEY: test
          TURNKEY_API_PUBLIC_KEY: test
          TURNKEY_API_PRIVATE_KEY: test
          TURNKEY_ORGANIZATION_ID: test
        run: npm test

  contracts-test:
    name: Foundry Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - working-directory: packages/contracts
        run: forge test -vvv
      - working-directory: packages/contracts
        run: forge coverage --report summary

  e2e-test:
    name: E2E Tests
    continue-on-error: true
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentfi
          POSTGRES_PASSWORD: agentfi
          POSTGRES_DB: agentfi_e2e
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - run: npm ci
      # Generate Prisma client — required before any module that imports @prisma/client
      - run: npx prisma generate --schema=packages/backend/src/db/schema.prisma
      # Apply DB migrations against the e2e database before starting tests
      - working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://agentfi:agentfi@localhost:5432/agentfi_e2e
        run: npx prisma migrate deploy
      - working-directory: packages/backend
        env:
          NODE_ENV: development
          DATABASE_URL: postgresql://agentfi:agentfi@localhost:5432/agentfi_e2e
          REDIS_URL: redis://localhost:6379
          API_SECRET: e2e-test-secret-min-32-chars-long
          ADMIN_SECRET: e2e-admin-secret
          # Dummy values — Alchemy/Turnkey are bypassed by E2E mocks
          ALCHEMY_API_KEY: e2e-dummy
          TURNKEY_API_PUBLIC_KEY: e2e-dummy
          TURNKEY_API_PRIVATE_KEY: e2e-dummy
          TURNKEY_ORGANIZATION_ID: e2e-dummy
          # OPERATOR_FEE_WALLET is overridden at runtime by globalSetup
          OPERATOR_FEE_WALLET: '0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266'
        run: npm run test:e2e
