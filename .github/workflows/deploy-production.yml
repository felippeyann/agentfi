name: Deploy Production

# Manual/tag-triggered production deploy via Railway CLI.
#
# Required repository secrets:
# - RAILWAY_TOKEN
# - RAILWAY_PROJECT_ID
# - RAILWAY_PRODUCTION_ENVIRONMENT
#
# Optional repository variable:
# - RAILWAY_PRODUCTION_SERVICE (defaults to `backend`)
#
# Operations runbook:
# - docs/production-release-runbook.md

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA). Default: current workflow ref'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Railway Production
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_PRODUCTION_ENVIRONMENT: ${{ secrets.RAILWAY_PRODUCTION_ENVIRONMENT }}
      RAILWAY_PRODUCTION_SERVICE: ${{ vars.RAILWAY_PRODUCTION_SERVICE || 'backend' }}

    steps:
      - name: Validate required secrets
        run: |
          missing=0
          for key in RAILWAY_TOKEN RAILWAY_PROJECT_ID RAILWAY_PRODUCTION_ENVIRONMENT; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout selected ref
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' }}
        run: git checkout "${{ inputs.ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy service to Railway production
        run: |
          railway up \
            --ci \
            --service "$RAILWAY_PRODUCTION_SERVICE" \
            --environment "$RAILWAY_PRODUCTION_ENVIRONMENT" \
            --detach
