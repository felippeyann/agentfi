# =============================================================================
# AgentFi — nginx reverse proxy configuration
# Ubuntu 22.04 / nginx 1.18+
#
# Domains (replace YOUR_DOMAIN or run certbot to fill in cert paths):
#   api.YOUR_DOMAIN   → localhost:3000  (backend API)
#   admin.YOUR_DOMAIN → localhost:3001  (Next.js admin)
#   mcp.YOUR_DOMAIN   → localhost:3002  (MCP SSE server)
#
# After editing, test with:  sudo nginx -t
# Reload with:               sudo systemctl reload nginx
# Obtain certs with:
#   sudo certbot --nginx \
#     -d api.YOUR_DOMAIN -d admin.YOUR_DOMAIN -d mcp.YOUR_DOMAIN
# =============================================================================


# =============================================================================
# Global: Gzip compression
# Applied to all virtual hosts below.
# =============================================================================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    application/json
    application/javascript
    application/x-javascript
    text/javascript
    text/css
    text/plain
    text/xml
    application/xml
    application/rss+xml
    image/svg+xml;


# =============================================================================
# Rate limiting
# $binary_remote_addr keeps memory usage low.
# Zone "api_limit": 10 requests/sec per IP.
# =============================================================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;


# =============================================================================
# Upstream definitions
# Named upstreams make it easy to change ports without touching server blocks.
# =============================================================================
upstream agentfi_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream agentfi_admin {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream agentfi_mcp {
    server 127.0.0.1:3002;
    keepalive 32;
}


# =============================================================================
# Shared proxy headers snippet (included in each location block)
# =============================================================================
# Use a map to pass the correct scheme even behind a load balancer
map $http_x_forwarded_proto $real_scheme {
    default $scheme;
    https   https;
}


# =============================================================================
# HTTP → HTTPS redirect (all domains)
# Certbot will add its own redirect blocks; this acts as a catch-all.
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Allow certbot ACME challenges through before redirecting
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# =============================================================================
# api.YOUR_DOMAIN — Backend REST/WebSocket API (localhost:3000)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name api.YOUR_DOMAIN;

    # --- TLS (certbot will replace these placeholders) ---
    # ssl_certificate     /etc/letsencrypt/live/api.YOUR_DOMAIN/fullchain.pem;  # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/api.YOUR_DOMAIN/privkey.pem;    # managed by Certbot
    # include             /etc/letsencrypt/options-ssl-nginx.conf;               # managed by Certbot
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                    # managed by Certbot

    # --- Logging ---
    access_log /var/log/nginx/agentfi-api-access.log;
    error_log  /var/log/nginx/agentfi-api-error.log warn;

    # --- Security headers ---
    add_header X-Frame-Options        "DENY"                              always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- API routes with rate limiting ---
    location / {
        # Burst of 20 allows short spikes; nodelay returns 429 immediately once burst is full
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://agentfi_api;

        # Forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Keep-alive to upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings for normal API responses
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # Health check endpoint — no rate limiting
    location /health {
        proxy_pass http://agentfi_api/health;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
    }
}


# =============================================================================
# admin.YOUR_DOMAIN — Next.js admin dashboard (localhost:3001)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name admin.YOUR_DOMAIN;

    # --- TLS (certbot will replace these placeholders) ---
    # ssl_certificate     /etc/letsencrypt/live/admin.YOUR_DOMAIN/fullchain.pem;  # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/admin.YOUR_DOMAIN/privkey.pem;    # managed by Certbot
    # include             /etc/letsencrypt/options-ssl-nginx.conf;                # managed by Certbot
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                     # managed by Certbot

    # --- Logging ---
    access_log /var/log/nginx/agentfi-admin-access.log;
    error_log  /var/log/nginx/agentfi-admin-error.log warn;

    # --- Security headers ---
    add_header X-Frame-Options        "DENY"                              always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://agentfi_admin;

        # Forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Keep-alive to upstream (required for Next.js dev server; good for prod too)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Timeouts (Next.js SSR pages can be slow on first render)
        proxy_connect_timeout 10s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
    }

    # Next.js static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://agentfi_admin;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}


# =============================================================================
# mcp.YOUR_DOMAIN — MCP SSE server (localhost:3002)
#
# SSE (Server-Sent Events) requires:
#   - proxy_buffering off      : do not buffer the response body
#   - proxy_cache off          : never serve from cache
#   - X-Accel-Buffering: no    : tell nginx (and any upstream proxy) not to buffer
#   - long read timeout        : SSE connections are long-lived
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name mcp.YOUR_DOMAIN;

    # --- TLS (certbot will replace these placeholders) ---
    # ssl_certificate     /etc/letsencrypt/live/mcp.YOUR_DOMAIN/fullchain.pem;  # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/mcp.YOUR_DOMAIN/privkey.pem;    # managed by Certbot
    # include             /etc/letsencrypt/options-ssl-nginx.conf;              # managed by Certbot
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                   # managed by Certbot

    # --- Logging ---
    access_log /var/log/nginx/agentfi-mcp-access.log;
    error_log  /var/log/nginx/agentfi-mcp-error.log warn;

    # --- Security headers ---
    add_header X-Frame-Options        "DENY"                              always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://agentfi_mcp;

        # --- SSE-specific: disable all buffering ---
        proxy_buffering    off;           # do not buffer response body
        proxy_cache        off;           # never serve from cache
        add_header         X-Accel-Buffering "no" always;  # signal to downstream proxies

        # Forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Keep-alive / upgrade (needed if MCP also supports WebSocket transport)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Long timeouts — SSE connections stay open for minutes/hours
        proxy_connect_timeout  10s;
        proxy_send_timeout     3600s;
        proxy_read_timeout     3600s;
    }
}
