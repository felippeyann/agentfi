# Production override — uses pre-built images from GHCR instead of building locally.
# Usage on the server:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: '3.9'

services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:${IMAGE_TAG:-latest}
    build: !reset null

  mcp:
    image: ghcr.io/${GITHUB_REPOSITORY}/mcp:${IMAGE_TAG:-latest}
    build: !reset null

  admin:
    image: ghcr.io/${GITHUB_REPOSITORY}/admin:${IMAGE_TAG:-latest}
    build: !reset null
