[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 256

[profile.ci.fuzz]
runs = 1000

[rpc_endpoints]
mainnet      = "${ALCHEMY_API_KEY_RPC_MAINNET}"
base         = "${ALCHEMY_API_KEY_RPC_BASE}"
arbitrum     = "${ALCHEMY_API_KEY_RPC_ARB}"
polygon      = "${ALCHEMY_API_KEY_RPC_POLYGON}"
base_sepolia = "https://sepolia.base.org"
arb_sepolia  = "https://sepolia-rollup.arbitrum.io/rpc"

[etherscan]
mainnet      = { key = "${ETHERSCAN_API_KEY}" }
base         = { key = "${BASESCAN_API_KEY}",    url = "https://api.basescan.org/api" }
arbitrum     = { key = "${ARBISCAN_API_KEY}",    url = "https://api.arbiscan.io/api" }
polygon      = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.polygonscan.com/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}",    url = "https://api-sepolia.basescan.org/api" }
arb_sepolia  = { key = "${ARBISCAN_API_KEY}",    url = "https://api-sepolia.arbiscan.io/api" }
